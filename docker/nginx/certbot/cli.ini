# Certbot CLI configuration
# https://certbot.eff.org/docs/using.html#configuration-file

# Use DNS challenge for wildcard certificates
preferred-challenges = dns-01

# Use the Route53 DNS plugin for AWS
# dns-route53-propagation-seconds = 60

# For HTTP-01 (non-wildcard domains)
# preferred-challenges = http-01

# Email for renewal notices
email = admin@corex.dev

# Agree to Let's Encrypt Terms of Service
agree-tos = true

# Non-interactive mode
non-interactive = true

# Redirect HTTP to HTTPS in webroot mode
# no-redirect = true

# Keep updated certificate files
keep-until-expiring = true

# Deploy renewal hooks
deploy-hook = /etc/letsencrypt/renewal-hooks/post/deploy.sh

# Log level
verbose = 1

# Maximum number of certificate requests per minute
max-log-retries = 5

# RSA key size
rsa-key-size = 4096

# Use ECDSA for key type
key-type = ecdsa
elliptic-curve = secp384r1

# Renewal settings
renew-by-default = true
no-self-upgrade = true
