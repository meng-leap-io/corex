# Web Application Firewall Rules
# Include in server blocks: include /etc/nginx/includes/waf.conf;

# ---- SQL Injection ----
map $query_string $sql_injection_block {
    default 0;
    "~*(?:(?:union(.*?)select)|(?:select(.*?)from)|(?:drop\s+table)|(?:delete\s+from)|(?:insert\s+into)|(?:update\s+set)|(?:create\s+table)|(?:alter\s+table)|(?:truncate\s+table)|(?:exec\s*\()|(?:execute\s*\()|(?:xp_cmdshell)|(?:sp_executesql)|(?:pg_sleep)|(?:waitfor\s+delay)|(?:benchmark\s*\()|(?:sleep\s*\())" 1;
}

# ---- XSS ----
map $query_string $xss_block {
    default 0;
    "~*(?:<script[\s>]|javascript:\s*\(|onerror\s*=|onload\s*=|onclick\s*=|onmouseover\s*=|onfocus\s*=|onblur\s*=|onchange\s*=|onsubmit\s*=|onreset\s*=|onselect\s*=|onkeyup\s*=|onkeydown\s*=|onkeypress\s*=|alert\s*\(|confirm\s*\(|prompt\s*\(|document\.cookie|document\.location|window\.location|eval\s*\()" 1;
}

# ---- Path Traversal ----
map $uri $path_traversal_block {
    default 0;
    "~*\.\.(?:\\|/|%2f|%5c)" 1;
    "~*(?:/etc/passwd|/etc/shadow|/etc/hosts|\.git/config|\.env|composer\.json|wp-config\.php|web\.config|boot\.ini|windows/win\.ini)" 1;
}

# ---- Remote File Inclusion ----
map $args $rfi_block {
    default 0;
    "~*(?:file=\s*https?://|include=\s*https?://|require=\s*https?://|document=\s*https?://|src=\s*https?://|url=\s*https?://|data:\s*://)" 1;
}

# ---- Command Injection ----
map $query_string $cmd_injection_block {
    default 0;
    "~*(?:\||`|;\s*(?:id|whoami|uname|cat|chmod|chown|rm\s+-rf|wget|curl|bash|sh|python|perl|ruby|php\s+-r|nc\s+|nmap|ping\s+-c)\s)" 1;
}

# ---- Request smuggling / HTTP verb tampering ----
map $request_method $method_block {
    default 0;
    "~(?:CONNECT|TRACE|TRACK|DEBUG|PUT|DELETE|PATCH)" 1;
}

# ---- Block binary/malicious uploads ----
map $content_type $upload_block {
    default 0;
    "~(?:application/x-httpd-php|application/x-php|application/x-shell|text/x-perl|text/x-python)" 1;
}
