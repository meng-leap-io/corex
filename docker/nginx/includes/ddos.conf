# DDoS Protection Configuration
# Include in server blocks: include /etc/nginx/includes/ddos.conf;

# Connection limiting per IP
limit_conn addr_per_ip 10;
limit_conn_log_level warn;
limit_conn_status 429;

# Zone for connection limiting (redefined here for context)
limit_conn_zone $binary_remote_addr zone=per_ip:10m;

# Slowloris protection
client_body_timeout 10s;
client_header_timeout 10s;
send_timeout 10s;

# Limit request rate per IP (liberal for normal users, strict for abuse)
limit_req zone=per_ip_burst:10m burst=20 nodelay;
limit_req_log_level warn;
limit_req_status 429;

limit_req_zone $binary_remote_addr zone=per_ip_burst:10m rate=30r/s;

# Additional zones for different endpoints (redefined from nginx.conf context)
limit_req_zone $binary_remote_addr zone=strict:10m rate=5r/s;

# Limit connections per IP
if ($http_x_forwarded_for) {
    set $real_ip $http_x_forwarded_for;
}
if ($real_ip = "") {
    set $real_ip $remote_addr;
}
