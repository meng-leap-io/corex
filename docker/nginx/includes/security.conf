# Enhanced Security Configuration
# Include in server blocks: include /etc/nginx/includes/security.conf;

# ---- Rate Limiting ----
# Rate limiting zones (declared in nginx.conf http block)

# ---- WAF Integration ----
# Block SQL injection attempts
if ($sql_injection_block) {
    return 403;
    access_log /var/log/nginx/waf_blocked.log;
}

# Block XSS attempts
if ($xss_block) {
    return 403;
    access_log /var/log/nginx/waf_blocked.log;
}

# Block path traversal
if ($path_traversal_block) {
    return 403;
    access_log /var/log/nginx/waf_blocked.log;
}

# Block remote file inclusion
if ($rfi_block) {
    return 403;
    access_log /var/log/nginx/waf_blocked.log;
}

# Block command injection
if ($cmd_injection_block) {
    return 403;
    access_log /var/log/nginx/waf_blocked.log;
}

# Block dangerous HTTP methods
if ($method_block) {
    return 405;
    access_log /var/log/nginx/waf_blocked.log;
}

# Block malicious uploads
if ($upload_block) {
    return 403;
    access_log /var/log/nginx/waf_blocked.log;
}

# ---- POST size limits by endpoint ----
# Already set globally: client_max_body_size 128M

# ---- Secure cookies ----
proxy_cookie_path / "/; HTTPOnly; SameSite=Lax; Secure";

# ---- Disable server info ----
more_clear_headers "X-Powered-By";
more_clear_headers "Server";
more_clear_headers "x-powered-by";
more_clear_headers "X-CF-Powered-By";
