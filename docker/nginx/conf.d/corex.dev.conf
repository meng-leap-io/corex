# corex.dev - Landing Page
server {
    listen 80;
    listen [::]:80;
    server_name corex.dev www.corex.dev;
    
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name corex.dev www.corex.dev;

    ssl_certificate /etc/nginx/ssl/corex.dev.crt;
    ssl_certificate_key /etc/nginx/ssl/corex.dev.key;
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;

    root /var/www/frontend/landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy for如玉生 to Laravel backend
    location /api/ {
        proxy_pass http://php:9000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets with aggressive caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
