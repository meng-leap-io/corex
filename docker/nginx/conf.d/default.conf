upstream php-fpm {
    server php:9000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream ai-gateway {
    server ai-gateway:8000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# Include WAF rules and enhanced security
include /etc/nginx/includes/waf.conf;
include /etc/nginx/includes/security.conf;

# HTTP -> HTTPS redirect (all domains)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name corex.dev console.corex.dev api.corex.dev;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        auth_basic off;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main landing site - corex.dev
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    listen 443 quic reuseport;

    server_name corex.dev;

    root /var/www/frontend/landing;
    index index.html;

    # AddAltSvc header for HTTP/3
    add_header Alt-Svc 'h3=":443"; ma=86400';

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /console/ {
        alias /var/www/frontend/console/;
        try_files $uri $uri/ /console/index.html;
    }

    location /api/ {
        include /etc/nginx/includes/ddos.conf;
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://ai-gateway;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
        proxy_buffering off;

        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location /backend/ {
        include /etc/nginx/includes/ddos.conf;
        limit_req zone=api burst=50 nodelay;
        rewrite ^/backend/(.*)$ /$1 break;
        proxy_pass http://php-fpm;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
        add_header Cache-Control "no-store" always;
    }

    # Block sensitive files
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(?:\.env|composer\.(json|lock)|artisan|storage) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Cache static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# Console subdomain - console.corex.dev
