# Corex.dev Production Docker Compose
version: "3.9"

services:
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: corex-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./backend/public:/var/www/backend/public:ro
      - ./frontend/landing/dist:/var/www/frontend/landing:ro
      - ./frontend/console/dist:/var/www/frontend/console:ro
    depends_on:
      - php
      - ai-gateway
    networks:
      - corex-network
    restart: unless-stopped

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: corex-php
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini:ro
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: pgsql implícita
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
    depends_on:
      - redis
    networks:
      - corex-network
    restart: unless-stopped

  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: corex-queue
    working_dir: /var/www/backend
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www/backend
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - redis
    networks:
      - corex-network
    restart: unless-stopped

  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: corex-scheduler
    working_dir: /var/www/backend
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/backend
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - redis
    networks:
      - corex-network
    restart: unless-stopped

  ai-gateway:
    build:
      context: ./ai-gateway
      dockerfile: Dockerfile
    container_name: corex-ai-gateway
    environment:
      ENVIRONMENT: ${APP_ENV:-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - redis
    networks:
      - corex-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: corex-red
    volumes:
      - redis-data:/data
    networks:
      - corex-network
    restart: unless-stopped

volumes:
  redis-data:

networks:
  corex-network:
    driver: bridge