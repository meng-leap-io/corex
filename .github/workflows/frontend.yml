name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/resources/**"
      - "backend/public/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/resources/**"
      - "backend/public/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: frontend-${{ github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  CDN_BUCKET_STAGING: corex-cdn-staging
  CDN_BUCKET_PRODUCTION: corex-cdn-production
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  lint:
    name: ESLint & Prettier
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend
        continue-on-error: true

      - name: Run ESLint
        run: npx eslint resources/js/ --ext .js,.vue --max-warnings 50
        working-directory: backend
        continue-on-error: true

      - name: Check Prettier formatting
        run: npx prettier --check "resources/**/*.{js,vue,css,scss}"
        working-directory: backend
        continue-on-error: true

  build:
    name: Build Static Assets
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package.json

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none

      - name: Install Composer deps
        run: composer install --no-progress --prefer-dist --no-dev
        working-directory: backend
        env:
          COMPOSER_AUDIT: false

      - name: Install npm deps
        run: npm ci
        working-directory: backend
        continue-on-error: true

      - name: Build frontend assets
        run: |
          npx vite build --manifest --outDir public/build \
          || npx mix --production \
          || echo "No build tool found - copying raw assets"
        working-directory: backend
        continue-on-error: true

      - name: Optimize assets
        run: |
          # Minify CSS/JS if tools available
          which npx && npx sharp-cli --help >/dev/null 2>&1 && \
            npx sharp-cli optimize public/build/assets/*.css public/build/assets/*.js || true

          # Generate gzip and brotli for all static assets
          find public/build -type f \( -name '*.css' -o -name '*.js' -o -name '*.html' -o -name '*.svg' \) \
            -exec sh -c 'gzip -kf "$1"; brotli -kf "$1" 2>/dev/null || true' _ {} \;
        working-directory: backend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            backend/public/build/
            backend/public/favicon.ico
            backend/public/robots.txt
            !backend/public/build/**/*.map
          retention-days: 7
          compression-level: 0

  deploy-cdn-staging:
    name: Deploy to CDN (Staging)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.ref == 'refs/heads/develop' && github.event_name != 'pull_request' }}
    environment:
      name: staging
      url: https://cdn-staging.corex.dev

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3 with cache headers
        run: |
          aws s3 sync frontend-build/ \
            s3://${{ env.CDN_BUCKET_STAGING }}/assets/${{ github.sha }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.map"

          aws s3 sync frontend-build/ \
            s3://${{ env.CDN_BUCKET_STAGING }}/assets/current/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.map"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/assets/*" \
            --output json

      - name: Verify CDN
        run: |
          curl -sf https://cdn-staging.corex.dev/assets/current/ --max-time 10 || true

      - name: Notify Slack
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: deployments
          SLACK_TITLE: "Frontend deployed to staging CDN"
          SLACK_MESSAGE: "Commit: ${{ github.sha }}"
          SLACK_COLOR: good

  deploy-cdn-production:
    name: Deploy to CDN (Production)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    environment:
      name: production
      url: https://cdn.corex.dev

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3 production
        run: |
          aws s3 sync frontend-build/ \
            s3://${{ env.CDN_BUCKET_PRODUCTION }}/assets/${{ github.sha }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.map"

          aws s3 sync frontend-build/ \
            s3://${{ env.CDN_BUCKET_PRODUCTION }}/assets/current/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.map"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/assets/*" \
            --output json

      - name: Verify production CDN
        run: |
          curl -sf https://cdn.corex.dev/assets/current/ --max-time 10 || true

      - name: Notify Slack
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: deployments
          SLACK_TITLE: "Frontend deployed to production CDN"
          SLACK_MESSAGE: "Commit: ${{ github.sha }}"
          SLACK_COLOR: good
