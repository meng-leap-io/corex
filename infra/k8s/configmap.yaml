apiVersion: v1
kind: ConfigMap
metadata:
  name: corex-config
  namespace: corex
data:
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://corex.dev"
  DB_CONNECTION: "pgsql"
  DB_HOST: "corex-postgres"
  DB_PORT: "5432"
  DB_DATABASE: "corex"
  DB_USERNAME: "corex"
  REDIS_HOST: "corex-redis"
  REDIS_PORT: "6379"
  SESSION_DRIVER: "redis"
  CACHE_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"
  LOG_LEVEL: "info"
  LOG_CHANNEL: "stack"
  MAIL_MAILER: "smtp"
  MAIL_PORT: "587"
  MAIL_ENCRYPTION: "tls"
  MAIL_FROM_NAME: "Corex"
  STRIPE_KEY: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: corex
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    pid /var/run/nginx.pid;
    error_log /dev/stderr warn;
    events {
        worker_connections 4096;
        multi_accept on;
        use epoll;
    }
    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        keepalive_requests 1000;
        server_tokens off;
        client_max_body_size 128M;
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/javascript application/javascript application/json;
        include /etc/nginx/conf.d/*.conf;
    }
  default.conf: |
    upstream php-fpm {
        server corex-backend.corex.svc.cluster.local:9000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }
    upstream ai-gateway {
        server corex-ai-gateway.corex.svc.cluster.local:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }
    server {
        listen 80 default_server;
        server_name corex.dev console.corex.dev api.corex.dev;
        return 301 https://$server_name$request_uri;
    }
    server {
        listen 443 ssl http2;
        server_name corex.dev;
        ssl_certificate /etc/nginx/ssl/tls.crt;
        ssl_certificate_key /etc/nginx/ssl/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1h;
        root /var/www/frontend/landing;
        index index.html;
        location / { try_files $uri $uri/ /index.html; }
        location /console/ { alias /var/www/frontend/console/; try_files $uri $uri/ /console/index.html; }
        location /api/ {
            proxy_pass http://ai-gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_buffering off;
        }
        location /backend/ {
            rewrite ^/backend/(.*)$ /$1 break;
            proxy_pass http://php-fpm;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location ~ \.php$ {
            fastcgi_pass php-fpm;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 120s;
        }
        location /health { return 200 "ok\n"; add_header Content-Type text/plain; }
        location ~ /\.(?!well-known) { deny all; }
    }
  opcache.ini: |
    [opcache]
    opcache.enable=1
    opcache.enable_cli=1
    opcache.memory_consumption=256
    opcache.interned_strings_buffer=16
    opcache.max_accelerated_files=20000
    opcache.revalidate_freq=2
    opcache.fast_shutdown=1
    opcache.validate_timestamps=0
  php.ini: |
    [PHP]
    memory_limit=512M
    max_execution_time=300
    post_max_size=128M
    upload_max_filesize=128M
    date.timezone=UTC
    expose_php=Off
    display_errors=Off
    log_errors=On
