apiVersion: apps/v1
kind: Deployment
metadata:
  name: corex-nginx
  namespace: corex
  labels:
    app: corex-nginx
    tier: frontend
    app.kubernetes.io/name: corex-nginx
    app.kubernetes.io/component: reverse-proxy
    app.kubernetes.io/part-of: corex-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: corex-nginx
  template:
    metadata:
      labels:
        app: corex-nginx
        tier: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        rollme: "1"
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: nginx
          image: ghcr.io/corex/nginx:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
            - containerPort: 443
              name: https
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: tls
              mountPath: /etc/nginx/ssl
              readOnly: true
            - name: landing
              mountPath: /var/www/frontend/landing
              readOnly: true
            - name: console
              mountPath: /var/www/frontend/console
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: tls
          secret:
            secretName: corex-tls
        - name: landing
          emptyDir: {}
        - name: console
          emptyDir: {}
