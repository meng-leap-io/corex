apiVersion: apps/v1
kind: Deployment
metadata:
  name: corex-backend
  namespace: corex
  labels:
    app: corex-backend
    tier: backend
    app.kubernetes.io/name: corex-backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: corex-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: corex-backend
  template:
    metadata:
      labels:
        app: corex-backend
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
        prometheus.io/path: "/metrics"
        rollme: "1"
    spec:
      terminationGracePeriodSeconds: 60
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: php-fpm
          image: ghcr.io/corex/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9000
              name: fpm
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: corex-config
                  key: APP_ENV
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: corex-secrets
                  key: APP_KEY
            - name: APP_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: corex-config
                  key: APP_DEBUG
            - name: APP_URL
              valueFrom:
                configMapKeyRef:
                  name: corex-config
                  key: APP_URL
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: corex-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: corex-config
                  key: DB_PORT
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: corex-config
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: corex-config
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: corex-secrets
                  key: DB_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: corex-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: corex-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: corex-secrets
                  key: REDIS_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: corex-secrets
                  key: JWT_SECRET
            - name: SESSION_DRIVER
              valueFrom:
                configMapKeyRef:
                  name: corex-config
                  key: SESSION_DRIVER
            - name: CACHE_DRIVER
              valueFrom:
                configMapKeyRef:
                  name: corex-config
                  key: CACHE_DRIVER
            - name: QUEUE_CONNECTION
              valueFrom:
                configMapKeyRef:
                  name: corex-config
                  key: QUEUE_CONNECTION
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: corex-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: corex-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_BUCKET
              valueFrom:
                secretKeyRef:
                  name: corex-secrets
                  key: AWS_BUCKET
            - name: MAIL_MAILER
              valueFrom:
                configMapKeyRef:
                  name: corex-config
                  key: MAIL_MAILER
            - name: MAIL_HOST
              valueFrom:
                secretKeyRef:
                  name: corex-secrets
                  key: MAIL_HOST
            - name: MAIL_PORT
              valueFrom:
                configMapKeyRef:
                  name: corex-config
                  key: MAIL_PORT
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: corex-secrets
                  key: MAIL_USERNAME
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: corex-secrets
                  key: MAIL_PASSWORD
            - name: MAIL_FROM_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: corex-secrets
                  key: MAIL_FROM_ADDRESS
            - name: STRIPE_SECRET
              valueFrom:
                secretKeyRef:
                  name: corex-secrets
                  key: STRIPE_SECRET
          volumeMounts:
            - name: storage
              mountPath: /var/www/backend/storage
            - name: php-config
              mountPath: /usr/local/etc/php/conf.d/99-custom.ini
              subPath: php.ini
            - name: php-config
              mountPath: /usr/local/etc/php/conf.d/opcache.ini
              subPath: opcache.ini
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1"
          livenessProbe:
            exec:
              command: ["php-fpm", "-t"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["php-fpm", "-t"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: corex-storage
        - name: php-config
          configMap:
            name: corex-config
            items:
              - key: php.ini
                path: php.ini
              - key: opcache.ini
                path: opcache.ini
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corex-queue
  namespace: corex
  labels:
    app: corex-queue
    tier: worker
    app.kubernetes.io/name: corex-queue
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: corex-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: corex-queue
  template:
    metadata:
      labels:
        app: corex-queue
        tier: worker
    spec:
      terminationGracePeriodSeconds: 60
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: queue-worker
          image: ghcr.io/corex/backend:latest
          command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
          envFrom:
            - configMapRef:
                name: corex-config
            - secretRef:
                name: corex-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corex-scheduler
  namespace: corex
  labels:
    app: corex-scheduler
    tier: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: corex-scheduler
  template:
    metadata:
      labels:
        app: corex-scheduler
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: scheduler
          image: ghcr.io/corex/backend:latest
          command: ["php", "artisan", "schedule:work"]
          envFrom:
            - configMapRef:
                name: corex-config
            - secretRef:
                name: corex-secrets
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
