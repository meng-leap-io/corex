apiVersion: v1
kind: Service
metadata:
  name: corex-nginx
  namespace: corex
  labels:
    app: corex-nginx
    app.kubernetes.io/name: corex-nginx
    app.kubernetes.io/component: reverse-proxy
    app.kubernetes.io/part-of: corex-platform
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
    - port: 443
      targetPort: 443
      protocol: TCP
      name: https
  selector:
    app: corex-nginx
