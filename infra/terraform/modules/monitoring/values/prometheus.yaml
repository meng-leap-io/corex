global:
  evaluation_interval: 30s
  scrape_interval: 30s
  external_labels:
    cluster: "${cluster_name}"
    environment: "${environment}"

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
      slack_api_url: ""
    route:
      group_by: ["alertname", "cluster", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "default"
      routes:
        - match:
            severity: critical
          receiver: "critical"
          repeat_interval: 1h
    receivers:
      - name: "default"
        slack_configs:
          - channel: "#alerts"
            title: '{{ template "slack.default.title" . }}'
            text: '{{ template "slack.default.text" . }}'
      - name: "critical"
        slack_configs:
          - channel: "#critical"
            title: '[CRITICAL] {{ template "slack.default.title" . }}'
            text: '{{ template "slack.default.text" . }}'

grafana:
  enabled: true
  adminPassword: "${grafana_admin_password}"
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - "grafana.${environment}.corex.dev"
    tls:
      - hosts:
          - "grafana.${environment}.corex.dev"
        secretName: grafana-tls
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-operated:9090
          access: proxy
          isDefault: true
        - name: Loki
          type: loki
          url: http://loki-gateway:80
          access: proxy
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: corex
          orgId: 1
          folder: Corex
          type: file
          disableDeletion: true
          editable: true
          options:
            path: /var/lib/grafana/dashboards/corex

prometheus:
  prometheusSpec:
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false
    resources:
      requests:
        memory: 2Gi
      limits:
        memory: 4Gi
    retention: 15d
    retentionSize: 50GB
    walCompression: true
    enableAdminAPI: false
    replicas: 2
    podAntiAffinity: soft
