loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  ingester:
    chunk_encoding: snappy
  querier:
    max_concurrent: 4
  pattern_ingester:
    enabled: true

singleBinary:
  replicas: 1
  persistence:
    size: 10Gi

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

gateway:
  nginxConfig:
    customBackendUrl: http://loki-backend:3100
    customReadUrl: http://loki-read:3100
