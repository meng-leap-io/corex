# Corex.dev Grafana Configuration
[server]
domain = grafana.corex.dev
root_url = https://grafana.corex.dev
http_port = 3000
enable_gzip = true

[security]
admin_user = ${GRAFANA_ADMIN_USER:-admin}
admin_password = ${GRAFANA_ADMIN_PASSWORD:-admin}
secret_key = ${GRAFANA_SECRET_KEY}
cookie_secure = true
cookie_samesite = lax
allow_embedding = false

[users]
default_theme = dark
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_role = Viewer
viewers_can_edit = false

[auth]
disable_login_form = false
oauth_auto_login = false

[auth.basic]
enabled = true

[auth.anonymous]
enabled = false

[log]
mode = console
level = info

[log.console]
format = json

[metrics]
enabled = true
interval_seconds = 15

[metrics.graphite]
enabled = false

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/system-metrics.json
min_refresh_interval = 5s
versions_to_keep = 20

[alerting]
enabled = true
execute_alerts = true
concurrent_render_limit = 5

[unified_alerting]
enabled = true

[explore]
enabled = true

[panels]
enable_alpha = false
disable_sanitize_html = false

[plugins]
allow_loading_unsigned_plugins = grafana-clock-panel
enable_alpha = false
app_tls_skip_verify_insecure = true
