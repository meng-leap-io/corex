# Corex.dev Grafana Datasources
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      queryTimeout: 60s
      httpMethod: POST
      prometheusType: Prometheus
      prometheusVersion: 2.53.0
      manageAlerts: true
      alertmanagerUid: alertmanager

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: trace_id
          type: label
          matcherType: regex
          matcherRegex: 'trace_id=(\w+)'
          url: 'http://tempo:3200/explore?traceId=$${__value.raw}'
        - name: request_id
          type: label
          matcherType: regex
          matcherRegex: 'request_id=(\w+)'
          url: ''

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      nodeGraph:
        enabled: true
      search:
        hide: false
      tracesToLogs:
        datasourceUid: loki
        tags:
          - instance
          - pod
          - namespace
        mappedTags:
          - key: service.name
            value: service

  - name: Alertmanager
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    editable: false
    jsonData:
      handleGrafanaManagedAlerts: true
      implementation: prometheus
