# Corex.dev Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    environment: "${ENVIRONMENT:-production}"
    region: "${AWS_REGION:-us-east-1}"
    cluster: "corex"

alerting:
  alert_relabel_configs:
    - source_labels: [dc, environment]
      regex: (.+):.+:(.+)
      target_label: region
      replacement: $1
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/alerts.yml
  - /etc/prometheus/rules/recording.yml

scrape_configs:

  # ── Prometheus self-monitoring ──────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets:
        - localhost:9090
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: go_.*
        action: keep

  # ── AI Gateway (FastAPI) ────────────────────────────────────────────
  - job_name: ai-gateway
    scrape_interval: 10s
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
        - ai-gateway:8000
        - ai-gateway:8001
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: ([^:]+)(?::\d+)?
        replacement: $1
      - source_labels: [__address__]
        target_label: pod
        regex: .*
        replacement: $1
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "ai_(cost|usage|token|latency|request).*"
        action: keep
      - source_labels: [__name__]
        regex: "python_.*"
        action: keep
      - source_labels: [__name__]
        regex: "http_request_duration_seconds.*"
        action: keep
      - source_labels: [__name__]
        regex: "http_requests_total.*"
        action: keep
      - source_labels: [__name__]
        regex: "process_.*"
        action: keep
    basic_auth:
      username: prometheus
      password: ${PROMETHEUS_PASSWORD}

  # ── PHP Backend (Laravel) ──────────────────────────────────────────
  - job_name: php-backend
    scrape_interval: 10s
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
        - php-fpm:9090
        - php-fpm:9253
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: ([^:]+)(?::\d+)?
        replacement: $1
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "php_.*"
        action: keep
      - source_labels: [__name__]
        regex: "laravel_.*"
        action: keep
      - source_labels: [__name__]
        regex: "http_.*"
        action: keep

  # ── Nginx ──────────────────────────────────────────────────────────
  - job_name: nginx
    scrape_interval: 15s
    metrics_path: /nginx_status
    scheme: http
    static_configs:
      - targets:
        - nginx:8080
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "nginx_.*"
        action: keep

  # ── PostgreSQL ─────────────────────────────────────────────────────
  - job_name: postgres
    scrape_interval: 15s
    static_configs:
      - targets:
        - postgres-exporter:9187
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: ([^:]+)(?::\d+)?
        replacement: postgres

  # ── Redis ──────────────────────────────────────────────────────────
  - job_name: redis
    scrape_interval: 15s
    static_configs:
      - targets:
        - redis-exporter:9121
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: ([^:]+)(?::\d+)?
        replacement: redis

  # ── Node / Host metrics ────────────────────────────────────────────
  - job_name: node
    scrape_interval: 30s
    static_configs:
      - targets:
        - node-exporter:9100
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "node_(cpu|memory|disk|network|load|filesystem).*"
        action: keep

  # ── Docker containers ──────────────────────────────────────────────
  - job_name: docker
    scrape_interval: 30s
    static_configs:
      - targets:
        - cadvisor:8080
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "container_(cpu|memory|network|disk).*"
        action: keep

  # ── Kubernetes (when deployed) ──────────────────────────────────────
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - corex
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__meta_kubernetes_pod_name, __meta_kubernetes_pod_container_name]
        separator: /
        target_label: instance
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

  # ── Blackbox probe for external endpoints ──────────────────────────
  - job_name: blackbox
    scrape_interval: 60s
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - https://corex.dev/health
        - https://api.corex.dev/health
        - https://console.corex.dev/health
        - https://staging.corex.dev/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
